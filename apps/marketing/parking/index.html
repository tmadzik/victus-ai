<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Victus AI — Coming soon</title>
    <meta
      name="description"
      content="The Victus AI clinical platform is launching soon at app.victusdata.com."
    />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        /* Brand — Victus green (matches @victus/ui design tokens) */
        --brand-50: oklch(0.97 0.02 140);
        --brand-100: oklch(0.94 0.05 140);
        --brand-500: oklch(0.664 0.184 140);
        --brand-600: oklch(0.55 0.16 140);
        --brand-700: oklch(0.46 0.135 140);
        --brand-900: oklch(0.29 0.075 140);
        --brand-950: oklch(0.21 0.05 140);
        --grey-500: oklch(0.543 0 0);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background-color: #fff;
        color: var(--brand-950);
        font-family:
          'Inter',
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
      }

      main {
        width: 100%;
        max-width: 32rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .logo {
        width: 168px;
        height: auto;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.85rem;
        border-radius: 9999px;
        background: var(--brand-50);
        color: var(--brand-700);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        box-shadow: inset 0 0 0 1px var(--brand-100);
      }

      .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 9999px;
        background: var(--brand-500);
        animation: pulse 2s ease-in-out infinite;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 600;
        letter-spacing: -0.035em;
        text-wrap: balance;
      }

      p {
        margin: 0;
        max-width: 28rem;
        font-size: 1.0625rem;
        line-height: 1.6;
        color: var(--brand-700);
        text-wrap: pretty;
      }

      a.back {
        color: var(--brand-700);
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
      }
      a.back:hover {
        color: var(--brand-950);
      }
      a.back:focus-visible {
        outline: 2px solid var(--brand-500);
        outline-offset: 2px;
        border-radius: 4px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="logo"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 2340 1560"
        role="img"
        aria-label="Victus"
      >
        <text
          transform="translate(295.92 1306.45)"
          fill="#706f6f"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-weight="800"
          font-size="355.76"
        >
          <tspan x="0" y="0">VICTUS</tspan>
        </text>
        <g>
          <path
            fill="#706f6f"
            d="M667.18,271.4l82.67,143.18c184.91,320.28,502.54-285.91,698.06-337.92h-114.67c-315.73,0-357.78,495.78-666.06,194.74Z"
          />
          <path
            fill="#706f6f"
            d="M868.92,620.82l145.04,251.21c25.37,43.93,66.87,43.93,92.23,0L1503.13,184.52c-146.3,25.61-327.24,436.31-634.21,436.31Z"
          />
          <circle fill="#4aad33" cx="847.02" cy="204.33" r="130.76" />
        </g>
      </svg>

      <span class="pill"><span class="dot" aria-hidden="true"></span>Coming soon</span>

      <h1>The Victus platform is on its way.</h1>

      <p>
        The Victus AI clinical platform will live here at app.victusdata.com. We&rsquo;re putting
        the finishing touches on a secure, POPIA-compliant environment for population risk
        management.
      </p>

      <a class="back" href="https://www.victusdata.com">Back to victusdata.com &rarr;</a>
    </main>
  </body>
</html>
