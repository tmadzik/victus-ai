# Localhost demo overlay — layered on top of docker-compose.prod.yml.
#
# Differences from production: no Caddy/TLS (browsers treat http://localhost as a
# secure context, so the rPPG camera capture still works), and each service is
# published directly on a local port.
#
# NOTE ON PORT BINDINGS: the three browser-facing services publish WITHOUT a
# 127.0.0.1 prefix. macOS resolves "localhost" to ::1 (IPv6) before 127.0.0.1,
# and a loopback-only bind is IPv4-only — so browsers that try IPv6 first get
# connection-refused and the site looks down even though the container is
# healthy. Publishing on all interfaces answers on both stacks (and lets you
# open the kiosk from a phone on the same network). Postgres stays loopback-only.
#
#   http://localhost:3001  marketing site
#   http://localhost:3000  clinical web app
#   http://localhost:8000  API
#
# Use ./infra/demo-up.sh rather than invoking compose by hand.
name: victus-ai-demo

services:
  postgres:
    # Published on 5433 so it cannot collide with a local Postgres on 5432.
    # Kept loopback-only: nothing outside this machine should reach the database.
    ports:
      - "127.0.0.1:5433:5432"

  api:
    # The demo runs the TRAINED model. The torch-free rule-based fallback carries
    # ~0.5 vacuity, so its noise floor swallows even a large real move and no
    # risk trend can ever be called significant — which would hide the
    # trajectory and rising-risk features during a demo.
    build:
      args:
        WITH_TORCH: "1"
    environment:
      VICTUS_TRIAGE_MODEL_PATH: /app/models/triage_edl_multihead_v1.pt
      # Gateway terminal auth (kioskId:token) + the number the QR deep-links to.
      KIOSK_DEVICE_TOKENS: demo-kiosk-1:demo-kiosk-token
      KIOSK_WHATSAPP_NUMBER: "263771234567"
      # Surface HRV + stress index, which the pipeline computes but withholds by
      # default because they are not validated against a clinical reference.
      # They render labelled "(experimental)". DEMO ONLY — leave this off in
      # production, where an unvalidated number must not look like a measurement.
      TOI_EXPOSE_EXPERIMENTAL_BIOMARKERS: "1"
    ports:
      - "8000:8000"

  web:
    build:
      args:
        # Lets the TOI wizard submit a synthetic capture instead of driving the
        # webcam — essential in a meeting room, where poor light or a missed face
        # lock would otherwise sink the demo. Never enable outside a demo.
        NEXT_PUBLIC_ENABLE_DEMO_CAPTURE: "1"
    environment:
      NEXT_PUBLIC_ENABLE_DEMO_CAPTURE: "1"
      # Provisions this instance as a Mobile Clinic Gateway terminal, which
      # unlocks the /kiosk screen. Must match KIOSK_DEVICE_TOKENS on the API.
      KIOSK_ID: demo-kiosk-1
      KIOSK_DEVICE_TOKEN: demo-kiosk-token
    ports:
      - "3000:3000"

  marketing:
    ports:
      - "3001:3000"

  # Mobile Clinic Gateway + WhatsApp worker. Runs with --local-media, which
  # swaps in the stdout replier: the messages that would go to a participant's
  # WhatsApp (secure portal link, then the OTP) are printed to this container's
  # log instead. No Meta credentials required.
  worker:
    command: ["python", "-m", "victus_api.worker", "--loop", "--local-media"]
    environment:
      WEB_APP_BASE_URL: ${PUBLIC_APP_URL}
      TOI_EXPOSE_EXPERIMENTAL_BIOMARKERS: "1"

  # No TLS termination needed on localhost — park Caddy behind a profile that is
  # never requested so `up` does not start it.
  caddy:
    profiles: ["never"]

volumes:
  postgres_data:
    name: victus_demo_postgres_data
  caddy_data:
    name: victus_demo_caddy_data
  caddy_config:
    name: victus_demo_caddy_config
